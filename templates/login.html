<style>
    .password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.password-wrapper input {
    width: 100%;
    padding-right: 40px; /* icon အတွက် နေရာချန်ထားတာ */
}

.toggle-password {
    position: absolute;
    right: 10px;
    cursor: pointer;
    user-select: none;
    font-size: 18px;
}
</style>
{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>

        <form method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-group password-wrapper" style="position: relative;">
                <input type="password" name="password" id="password" placeholder="Password" required style="width: 100%; padding-right: 40px;">
                <span class="toggle-password" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">👁️</span>
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p class="switch-text">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </p>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.querySelector(".toggle-password");
    
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🙈"; 
    } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "👁️";
    }
}
</script>
{% endblock %}
