{% extends "base.html" %}
{% block title %}Search Tours - GIHUT Travels{% endblock %}

{% block content %}
<style>
    .tour-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
        padding: 40px;
    }
    .tour-card {
        position: relative;
        height: 400px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        transition: transform 0.5s ease;
    }
    .tour-card:hover {
        transform: translateY(-15px);
    }
    .tour-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }
    .tour-card:hover img {
        transform: scale(1.1);
    }
    .tour-info {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 25px;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
        color: white;
    }
    .view-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 20px;
        background: #1abc9c;
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 500;
        transition: 0.3s;
    }
    .view-btn:hover { background: #2ecc71; box-shadow: 0 5px 15px rgba(46,204,113,0.4); }
</style>
<div class="tour-grid">
    {% for p in packages %}
    <div class="tour-card">
        <img src="{{ url_for('static', filename='images/' + p.img_main) }}" loading="lazy">
        <div class="overlay"></div>
        <div class="tour-info">
            <h3>{{ p.name }}</h3>
            <p>{{ p.description }}</p>
            <a href="{{ url_for('tour_details', tour_id=p.id) }}" class="view-btn">View Details</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
